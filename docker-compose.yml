services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: taskei-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: task-management
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskei-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskei-backend
    restart: always
    environment:
      DBMS_USERNAME: ${DBMS_USERNAME:-root}
      DBMS_PASSWORD: ${DBMS_PASSWORD:-123456}
      DB_HOST: mysql          # <-- dùng tên service thay vì localhost
      DB_PORT: 3306
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskei-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskei-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskei-network

volumes:
  mysql_data:

networks:
  taskei-network:
    driver: bridge